name: Publish capability-runtime to PyPI

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to validate before publish (for example v0.1.0)"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.release_tag) || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install project and build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install build

      - name: Guardrail (tag ↔ version alignment)
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
        run: |
          python scripts/check_release_tag_version.py --tag "${RELEASE_TAG}"

      - name: Release regression guardrails
        run: |
          timeout 300s nice -n 19 ionice -c3 python -m pytest -q \
            tests/test_dependency_pins.py \
            tests/test_public_api_exports.py \
            tests/test_review_followups_module_contracts.py \
            tests/test_config_glue.py \
            tests/test_repo_no_deep_imports_in_user_facing_docs.py \
            tests/test_docs_scheme2_no_skilladapter_residue.py \
            tests/test_examples_smoke.py \
            tests/test_backend_mode.py \
            tests/test_integration_agently_requester_smoke.py \
            tests/test_agently_backend.py \
            tests/test_agently_backend_replay.py \
            tests/test_openai_responses_compatible_bridge.py \
            tests/test_agently_backend_authorization_header_contract.py \
            tests/test_agently_bridge_diagnostics.py \
            tests/test_runtime_structured_stream.py \
            tests/test_dynamic_workflow_plan_contract.py \
            tests/test_dynamic_workflow_runtime.py \
            tests/test_triggerflow_lifecycle_mapping.py \
            tests/test_workflow_host_runtime_surface.py \
            tests/test_offline_backend_injection_evidence.py \
            tests/test_agently_workspace_recall_preview.py \
            tests/test_agently_action_artifact_evidence.py \
            tests/test_node_report_builder.py \
            tests/test_node_report_contract_v1.py \
            tests/test_runtime_hooks_and_schema_gate.py \
            tests/test_per_capability_llm_config_model_routing.py \
            tests/ui_events/test_runtime_ui_events_agent_stream.py \
            tests/ui_events/test_dynamic_dag_ui_events.py \
            tests/adapters/test_agent_adapter.py \
            tests/test_publish_real_provider_gate.py \
            -k "not test_source_specs_mark_continue_and_intervention_as_preview"

      - name: Real provider bridge release gate
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
          CAPRT_REAL_PROVIDER_REQUIRE_TRUSTED_HOST: "1"
          CAPRT_REAL_PROVIDER_ALLOWED_HOSTS: ${{ secrets.CAPRT_REAL_PROVIDER_ALLOWED_HOSTS }}
          CAPRT_REAL_PROVIDER_ALLOW_INSECURE_TRANSPORT: ${{ secrets.CAPRT_REAL_PROVIDER_ALLOW_INSECURE_TRANSPORT }}
          CAPRT_REAL_PROVIDER_REQUIRE_IDENTITY: "1"
          CAPRT_REAL_PROVIDER_MODELS_SHA256: ${{ secrets.CAPRT_REAL_PROVIDER_MODELS_SHA256 }}
        run: |
          set -euo pipefail
          if [ -n "${CAPRT_REAL_PROVIDER_DISABLE_TRUSTED_HOST_GUARD_FOR_TESTS:-}" ] || [ -n "${CAPRT_REAL_PROVIDER_DISABLE_IDENTITY_GUARD_FOR_TESTS:-}" ]; then
            echo "::error::Real provider guard disable variables are forbidden in publish gate."
            exit 1
          fi
          unset CAPRT_REAL_PROVIDER_DISABLE_TRUSTED_HOST_GUARD_FOR_TESTS
          unset CAPRT_REAL_PROVIDER_DISABLE_IDENTITY_GUARD_FOR_TESTS
          if [ -n "${OPENAI_API_KEY}" ] && [ -n "${OPENAI_BASE_URL}" ] && [ -n "${MODEL_NAME}" ] && [ -n "${CAPRT_REAL_PROVIDER_ALLOWED_HOSTS}" ] && [ -n "${CAPRT_REAL_PROVIDER_MODELS_SHA256}" ]; then
            CAPRT_REAL_PROVIDER_TESTS=1 timeout 240s nice -n 19 ionice -c3 python -m pytest -q \
              --junitxml /tmp/caprt-real-provider-smoke.xml \
              tests/integration/test_runtime_real_provider_bridge.py
            python - <<'PY'
          import sys
          import xml.etree.ElementTree as ET

          root = ET.parse("/tmp/caprt-real-provider-smoke.xml").getroot()
          suites = [root] if root.tag == "testsuite" else list(root.findall("testsuite"))
          tests = sum(int(suite.attrib.get("tests", "0")) for suite in suites)
          failures = sum(int(suite.attrib.get("failures", "0")) for suite in suites)
          errors = sum(int(suite.attrib.get("errors", "0")) for suite in suites)
          skipped = sum(int(suite.attrib.get("skipped", "0")) for suite in suites)
          passed = tests - failures - errors - skipped
          if failures or errors:
              print("::error::Real provider bridge smoke reported failures or errors.")
              sys.exit(1)
          required_real_smokes = {
              "test_real_provider_chat_completions_bridge_preserves_usage_model",
              "test_real_provider_chat_completions_tool_call_and_approval_evidence",
          }
          optional_response_smokes = {
              "test_real_provider_responses_bridge_preserves_usage_model",
              "test_real_provider_responses_tool_call_and_approval_evidence",
              "test_real_provider_responses_named_tool_choice_and_approval_evidence",
          }
          passed_cases = {
              case.attrib.get("name", "")
              for suite in suites
              for case in suite.findall("testcase")
              if not case.findall("failure") and not case.findall("error") and not case.findall("skipped")
          }
          skipped_cases = {
              case.attrib.get("name", "")
              for suite in suites
              for case in suite.findall("testcase")
              if case.findall("skipped")
          }
          unexpected_skips = sorted(skipped_cases - optional_response_smokes)
          if unexpected_skips:
              print(f"::error::Real provider bridge smoke skipped non-optional tests: {unexpected_skips}")
              sys.exit(1)
          missing_real_smokes = sorted(required_real_smokes - passed_cases)
          if missing_real_smokes:
              print(f"::error::Real provider bridge smoke did not execute required tests: {missing_real_smokes}")
              sys.exit(1)
          if passed < len(required_real_smokes):
              print("::error::Real provider bridge smoke did not execute enough required tests.")
              sys.exit(1)
          if skipped_cases:
              print(f"real provider bridge response smoke skipped because provider did not advertise Responses support: {sorted(skipped_cases)}")
          print(f"real provider bridge smoke passed={passed} skipped={skipped} failures={failures} errors={errors}")
          PY
            cleanup_examples_env() {
              rm -f examples/apps/form_interview_pro/.env examples/apps/incident_triage_assistant/.env
            }
            trap cleanup_examples_env EXIT
            for app in form_interview_pro incident_triage_assistant; do
              printf 'OPENAI_API_KEY=%s\nOPENAI_BASE_URL=%s\nMODEL_NAME=%s\nCAPRT_REAL_PROVIDER_ALLOW_INSECURE_TRANSPORT=%s\n' \
                "${OPENAI_API_KEY}" "${OPENAI_BASE_URL}" "${MODEL_NAME}" "${CAPRT_REAL_PROVIDER_ALLOW_INSECURE_TRANSPORT}" > "examples/apps/${app}/.env"
            done
            CAPRT_TEST_E2E_BRIDGE=1 timeout 420s nice -n 19 ionice -c3 python -m pytest -q \
              tests/test_examples_real_integration.py::test_real_form_interview_pro_non_interactive \
              tests/test_examples_real_evidence_strict_integration.py::test_real_incident_triage_assistant_evidence_strict
            exit 0
          fi

          echo "::error::Real provider bridge smoke is required before publishing. Configure OPENAI_API_KEY, OPENAI_BASE_URL, MODEL_NAME, CAPRT_REAL_PROVIDER_ALLOWED_HOSTS, and CAPRT_REAL_PROVIDER_MODELS_SHA256 secrets so the release gate can prevent skipped tests, untrusted hosts, and model catalog drift before publishing."
          exit 1

      - name: Build sdist and wheel
        run: |
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

# agently-skills-runtime v0.2.0 示例配置（RuntimeConfig）
#
# 说明：
# - v0.2.0 主线的 protocol/runtime 不依赖上游；
# - 本文件仅提供 RuntimeConfig 的 YAML 形态示例；
# - `agently_agent` 等“运行期对象”无法在 YAML 中表达，应由宿主代码注入。

workspace_root: "."
sdk_config_paths:
  - "./config/sdk.local.yaml"  # 示例：你的 SDK overlays（路径可自定义；后者覆盖前者）
preflight_mode: "error"  # error|warn|off（仅保留字段；框架不定义人机交互）
max_loop_iterations: 200
max_depth: 10
